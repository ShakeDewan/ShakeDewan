name: Generate contribution snake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ShakeDewan
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%232563EB&color_dots=%23EBEDF0,%23BFDBFE,%2393C5FD,%2360A5FA,%231D4ED8
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%237DD3FC&color_dots=%23111827,%230F172A,%23123C69,%232563EB,%2360A5FA

      - name: Publish snake assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
